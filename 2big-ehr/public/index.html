<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2BIG EHR – Login</title>
  <link rel="icon" type="image/png" href="assets/favicon-32.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-wrapper">
    <div class="login-card">
      <div class="logo">
        <img src="assets/2biglogo.jpeg" alt="2BIG logo" class="login-logo">
        <h1>2BIG</h1>
        <p> Electronic Patient Record System</p>
      </div>
      <div id="alert" style="display:none"></div>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px">Sign In</button>
      </form>
    </div>
  </div>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem('ehr_user')) {
      window.location.href = 'dashboard.html';
    }

    // Demo-only authentication – validates against users.json; not secure for production use.
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const alertEl = document.getElementById('alert');
      alertEl.style.display = 'none';

      if (!username || !password) {
        alertEl.className = 'alert alert-error';
        alertEl.textContent = 'Username and password are required.';
        alertEl.style.display = 'block';
        return;
      }

      fetch('../data/users.json')
        .then(function(res) { return res.json(); })
        .then(function(users) {
          const match = users.find(function(u) {
            return u.username === username && u.password === password;
          });
          if (!match) {
            alertEl.className = 'alert alert-error';
            alertEl.textContent = 'Invalid username or password.';
            alertEl.style.display = 'block';
            return;
          }
          // Store safe user object (no password) then redirect
          const user = { id: match.id, name: match.name, role: match.role };
          localStorage.setItem('ehr_user', JSON.stringify(user));
          window.location.href = 'dashboard.html';
        })
        .catch(function() {
          alertEl.className = 'alert alert-error';
          alertEl.textContent = 'Unable to load credentials. Please try again.';
          alertEl.style.display = 'block';
        });
    });
  </script>
</body>
</html>
